<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 340px;
      padding: 14px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      margin: 0;
    }
    .header {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    #stats {
      font-size: 12px;
      color: #888;
      margin: 4px 0 12px;
    }
    #stats.error { color: #c62828; }
    .btn-primary {
      width: 100%;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #5b4cd4;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: #4a3cb8; }
    .btn-primary:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>
  <div class="header">Lore</div>
  <div id="stats">Detecting...</div>
  <button id="btn-send" class="btn-primary" disabled>Send to Lore</button>
  <script src="popup.js"></script>
</body>
</html>
