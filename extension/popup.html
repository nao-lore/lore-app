<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <img src="icon48.png" class="logo" alt="Lore">
      <span class="title">Lore</span>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="inject">📤 Inject Context</button>
      <button class="tab" data-tab="capture">📥 Capture</button>
    </div>

    <!-- Inject Tab -->
    <div class="tab-content active" id="tab-inject">
      <div id="inject-loading" class="loading">Loading contexts...</div>
      <div id="inject-empty" class="empty" style="display:none">
        <p>No project contexts available.</p>
        <p class="hint">Generate a snapshot in Lore first.</p>
      </div>
      <div id="inject-list" style="display:none">
        <!-- Filled dynamically -->
      </div>
    </div>

    <!-- Capture Tab -->
    <div class="tab-content" id="tab-capture">
      <p id="stats" class="stats">Detecting AI conversation...</p>
      <button id="btn-send" class="btn btn-primary" disabled>Send to Lore</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
