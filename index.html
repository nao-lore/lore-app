    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Lore — Turn AI conversations into structured handoffs">

    <meta name="description" content="Paste your ChatGPT, Claude, or Gemini conversation. Get a structured handoff with status, tasks, decisions, and next actions. Free & open source." />
    <meta name="theme-color" content="#7c5cfc" />
    <meta name="robots" content="index, follow" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Lore</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Lore",
      "url": "https://lore-app.vercel.app",
      "description": "Turn AI conversations into structured handoffs with status, tasks, decisions, and next actions.",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "Lore"
      }
    }
    </script>
  </head>
  <body>
    <script>
      // Apply theme before paint to prevent flash
      (function() {
        var t = localStorage.getItem('threadlog_theme') || 'system';
        var d = t === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : t;
        document.documentElement.setAttribute('data-theme', d);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
